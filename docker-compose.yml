
services:
  postgres:
    image: postgres:16
    container_name: bitspam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bitspam
      POSTGRES_PASSWORD: bitspam
      POSTGRES_DB: bitspam
    ports:
      - "5432:5432"
    volumes:
      - bitspam_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bitspam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  bitspam_pg: